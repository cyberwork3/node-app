name: Multiple jobs
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build step
        run: echo "hello world 1 build application"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test step
        run: echo "hello world 2 run test cases"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy step
        run: echo "hello world 3 deploy the application"

  name:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: My name
        run: echo "My name is ${{ vars.my_name}}"
  

# execure jobs sequentially

